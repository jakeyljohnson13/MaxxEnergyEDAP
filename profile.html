<!-- About Section -->
<div class="card mb-3 content">
<h1 class="m-3 pt-3">About</h1>
<div class="card-body">
    <img src="images\image.png" 
         class="rounded-circle mb-3" width="150">
         <div class="row">
            <div class="col-md-3"><h5>Full Name</h5></div>
            <div class="col-md-9 text-secondary" id="displayName">
              <!-- JS will insert name here -->
            </div>
          </div>
          <hr>
          <div class="row">
            <div class="col-md-3"><h5>Email</h5></div>
            <div class="col-md-9 text-secondary" id="displayEmail"></div>
          </div>
          <hr>
          <div class="row">
            <div class="col-md-3"><h5>Phone</h5></div>
            <div class="col-md-9 text-secondary" id="displayPhone"></div>
          </div>
          <hr>
          <div class="row">
            <div class="col-md-3"><h5>Address</h5></div>
            <div class="col-md-9 text-secondary" id="displayAddress"></div>
    </div>
  </div>

<!-- Update Profile Form -->
<div class="card mb-3 content">
<h1 class="m-3">Update Profile</h1>
<div class="card-body">
    <div class="form-row">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName">
      </div>
  
      <div class="form-row">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName">
      </div>
  
      <div class="form-row">
        <label for="phone">Phone</label>
        <input type="text" id="phone">
      </div>
  
      <div class="form-row">
        <label for="email">Email</label>
        <input type="text" id="email">
      </div>
  
      <div class="form-row">
        <label for="address">Address</label>
        <input type="text" id="address">
      </div>
  
      <div class="form-row">
        <label for="city">City</label>
        <input type="text" id="city">
      </div>
  
      <div class="form-row">
        <label for="state">State</label>
        <input type="text" id="state">
      </div>
  
      <div class="form-row">
        <label for="zip">Zip</label>
        <input type="text" id="zip">
      </div>
  <button class="btn btn-outline-danger" onclick="saveProfile()">Update</button>
</div>
</div>

</div>
</div>
</div>
